services:
  immich-kiosk:
    image: 'ghcr.io/damongolding/immich-kiosk:0.37.0'
    volumes:
      - '${APP_DATA_DIR}/data/config.yaml:/config.yaml'
    environment:
      - 'TZ=${TZ}'
      - 'KIOSK_IMMICH_API_KEY=${KIOSK_IMMICH_API_KEY}'
      - 'KIOSK_IMMICH_URL=${KIOSK_IMMICH_URL}'
      - 'KIOSK_ENABLE_URL_BUILDER=${KIOSK_ENABLE_URL_BUILDER}'
      - 'KIOSK_PASSWORD=${KIOSK_PASSWORD}'
      - 'KIOSK_PORT=3000'
    x-runtipi:
      internal_port: 3000
      is_main: true
x-runtipi:
  schema_version: 2
